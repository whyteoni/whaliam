[menu]

  # [[menu.main]]
  #   identifier = "about"
  #   name = "About"
  #   url = "/about/"
  #   weight = 10

[taxonomies]
genre = "genres"
tag = "tags"
collection = "collections"

# For hugo >= 0.60.0, enable inline HTML
[markup.goldmark.renderer]
unsafe = true

[markup]

  # Table of contents
  # Add toc = true to content front matter to enable
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = true
    toc        = true

[privacy]

[privacy.vimeo]
    disabled = false
    simple = true

[privacy.x]
    disabled = false
    enableDNT = true
    simple = true

[privacy.instagram]
    disabled = false
    simple = true

[privacy.youtube]
    disabled = false
    privacyEnhanced = true

[services]

  [services.instagram]
    disableInlineCSS = true

  [services.x]
    disableInlineCSS = true

