baseURL = "https://www.whaliam.com/"
theme = "risotto-0.5.1"
locale = "en-us"
title = "Whaliams Wall"
author = "Whaliam Wallace"
copyright = "(C) 2026, All Rights Reserved"
sectionPagesMenu = "main"
publishDir = "docs"

[pagination]
pagerSize = 5

[params]
noindex = false

[params.theme]
palette = "dracula"

